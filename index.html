<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمارين الدرس 1 — المصطلحات الطبية</title>
<style>
  :root{--navy:#09172D;--card:#0F213C;--row:#13294C;--gold:#D4AF37;--white:#EEF3FA;--grey:#9AA6BA;--blue:#2D7DE6;--orange:#F09632;--green:#36BE78;--purple:#9F77DD;--greyc:#9AA0AF;--red:#E5544B;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--navy);color:var(--white);font-family:'Segoe UI',Tahoma,'Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:16px;}
  .app{width:100%;max-width:640px;}
  header{text-align:center;padding:8px 0 16px;border-bottom:3px solid var(--gold);margin-bottom:18px;}
  header h1{margin:0;font-size:22px;} header p{margin:6px 0 0;color:var(--gold);font-size:14px;font-weight:bold;}
  .bar{height:8px;background:var(--row);border-radius:6px;overflow:hidden;margin:14px 0 6px;}
  .bar>i{display:block;height:100%;width:0;background:var(--gold);transition:width .3s;}
  .meta{display:flex;justify-content:space-between;font-size:13px;color:var(--grey);margin-bottom:14px;}
  .card{background:var(--card);border-radius:16px;padding:20px 18px;}
  .tag{display:inline-block;font-size:12px;font-weight:bold;color:#fff;border-radius:20px;padding:3px 12px;margin-bottom:12px;}
  .q{font-size:20px;font-weight:bold;line-height:1.6;margin:0 0 18px;}
  .opt{display:block;width:100%;text-align:right;background:var(--row);color:var(--white);border:2px solid transparent;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:17px;font-family:inherit;cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--gold);}
  .opt.correct{background:rgba(54,190,120,.22);border-color:var(--green);}
  .opt.wrong{background:rgba(229,84,75,.22);border-color:var(--red);}
  .fb{margin-top:6px;padding:14px 16px;border-radius:12px;font-size:15px;line-height:1.7;display:none;}
  .fb.ok{background:rgba(54,190,120,.15);border:1px solid var(--green);}
  .fb.no{background:rgba(229,84,75,.15);border:1px solid var(--red);}
  .fb b{color:var(--gold);}
  .next{display:none;width:100%;margin-top:16px;background:var(--gold);color:var(--navy);border:none;border-radius:12px;padding:15px;font-size:18px;font-weight:bold;font-family:inherit;cursor:pointer;}
  .result{text-align:center;padding:30px 18px;}
  .result .score{font-size:54px;font-weight:bold;color:var(--gold);}
  .result .msg{font-size:18px;margin:10px 0 24px;line-height:1.6;}
  .retry{background:var(--gold);color:var(--navy);border:none;border-radius:12px;padding:14px 28px;font-size:17px;font-weight:bold;font-family:inherit;cursor:pointer;}
  footer{text-align:center;color:var(--grey);font-size:12px;margin-top:18px;}
</style>
</head>
<body>
<div class="app">
  <header><h1>تمارين الدرس 1</h1><p>الجذور · البادئات · اللواحق · المصطلحات الكاملة</p></header>
  <div id="quiz">
    <div class="bar"><i id="prog"></i></div>
    <div class="meta"><span id="counter"></span><span id="live">النتيجة: 0</span></div>
    <div class="card">
      <span id="tag" class="tag"></span>
      <p id="question" class="q"></p>
      <div id="options"></div>
      <div id="feedback" class="fb"></div>
      <button id="nextBtn" class="next">التالي ←</button>
    </div>
  </div>
  <div id="end" class="card result" style="display:none;">
    <div class="score"><span id="finalScore"></span></div>
    <div class="msg" id="finalMsg"></div>
    <button class="retry" onclick="start()">أعد المحاولة 🔄</button>
  </div>
  <footer>دورة ترجمة المصطلحات الطبية — #الدرس_1</footer>
</div>
<script>
const C={root:'var(--blue)',latin:'var(--blue)',prefix:'var(--orange)',suffix:'var(--green)',vowel:'var(--greyc)',term:'var(--gold)'};
const LABEL={root:'جذر',latin:'جذر لاتيني',prefix:'بادئة',suffix:'لاحقة',vowel:'حرف ربط',term:'مصطلح كامل'};
const TAGTX={term:'#09172D'};
const QUESTIONS=[{"t": "root", "q": "ماذا يعني الجذر ‎cardi/o‎؟", "o": ["القلب", "الكلى", "المعدة", "الكبد"], "a": 0, "e": "cardi/o = القلب (يوناني kardia)."}, {"t": "root", "q": "ماذا يعني الجذر ‎gastr/o‎؟", "o": ["المعدة", "الأمعاء", "القولون", "القلب"], "a": 0, "e": "gastr/o = المعدة."}, {"t": "root", "q": "ماذا يعني الجذر ‎nephr/o‎؟", "o": ["الكلى", "الكبد", "المثانة", "العين"], "a": 0, "e": "nephr/o = الكلى (يوناني)؛ المرادف اللاتيني ren/o."}, {"t": "root", "q": "ماذا يعني الجذر ‎arthr/o‎؟", "o": ["المفاصل", "العظم", "العضلات", "الأعصاب"], "a": 0, "e": "arthr/o = المفاصل."}, {"t": "root", "q": "ماذا يعني الجذر ‎neur/o‎؟", "o": ["الأعصاب", "العضلات", "المفاصل", "الجلد"], "a": 0, "e": "neur/o = الأعصاب."}, {"t": "root", "q": "ماذا يعني الجذر ‎hepat/o‎؟", "o": ["الكبد", "الكلى", "المعدة", "القولون"], "a": 0, "e": "hepat/o = الكبد."}, {"t": "root", "q": "ماذا يعني الجذر ‎ophthalm/o‎؟", "o": ["العين", "الأذن", "الجلد", "الأنف"], "a": 0, "e": "ophthalm/o = العين."}, {"t": "root", "q": "ماذا يعني الجذر ‎derm/o‎؟", "o": ["الجلد", "العضلات", "العظم", "العين"], "a": 0, "e": "derm/o = الجلد."}, {"t": "root", "q": "ماذا يعني الجذر ‎oste/o‎؟", "o": ["العظم", "المفاصل", "العضلات", "الأعصاب"], "a": 0, "e": "oste/o = العظم."}, {"t": "root", "q": "ماذا يعني الجذر ‎col/o‎؟", "o": ["القولون", "المعدة", "الأمعاء الدقيقة", "الكبد"], "a": 0, "e": "col/o = القولون."}, {"t": "root", "q": "ماذا يعني الجذر ‎electr/o‎؟", "o": ["الكهرباء", "الحرارة", "الضوء", "الصوت"], "a": 0, "e": "electr/o = الكهرباء."}, {"t": "root", "q": "ماذا يعني الجذر ‎my/o‎؟", "o": ["العضلات", "العظم", "المفاصل", "الأعصاب"], "a": 0, "e": "my/o (myos) = العضلات."}, {"t": "root", "q": "ماذا يعني الجذر ‎enter/o‎؟", "o": ["الأمعاء", "المعدة", "القولون", "الكبد"], "a": 0, "e": "enter/o = الأمعاء."}, {"t": "root", "q": "ماذا يعني الجذر ‎ren/o‎؟", "o": ["الكلى", "الكبد", "الرئة", "الوريد"], "a": 0, "e": "ren/o جذر لاتيني = nephr/o = الكلى."}, {"t": "latin", "q": "الجذر اللاتيني ‎pulmo‎ يعني؟", "o": ["الرئة", "القلب", "الكلى", "الكبد"], "a": 0, "e": "pulmo (لاتيني) = الرئة؛ المرادف اليوناني pneumo."}, {"t": "latin", "q": "الجذر اللاتيني ‎ren‎ يعني؟", "o": ["الكلى", "القلب", "الرئة", "العظم"], "a": 0, "e": "ren (لاتيني) = nephr/o = الكلى."}, {"t": "latin", "q": "الجذر اللاتيني ‎cor‎ يعني؟", "o": ["القلب", "الوريد", "الرئة", "العضلة"], "a": 0, "e": "cor (لاتيني) = cardi/o = القلب."}, {"t": "latin", "q": "الجذر اللاتيني ‎vena‎ يعني؟", "o": ["الوريد", "الشريان", "القلب", "العصب"], "a": 0, "e": "vena (لاتيني) = الوريد؛ المرادف اليوناني phleb/o."}, {"t": "latin", "q": "الجذر اللاتيني ‎os‎ يعني؟", "o": ["العظم", "العضلة", "الجلد", "المفصل"], "a": 0, "e": "os (لاتيني) = oste/o = العظم."}, {"t": "latin", "q": "الجذر اللاتيني ‎muscul‎ يعني؟", "o": ["العضلة", "العظم", "الجلد", "الوريد"], "a": 0, "e": "muscul (لاتيني) = my/o = العضلة."}, {"t": "latin", "q": "الجذر اللاتيني ‎cutis‎ يعني؟", "o": ["الجلد", "العضلة", "العظم", "الرئة"], "a": 0, "e": "cutis (لاتيني) = derm/o = الجلد."}, {"t": "latin", "q": "الجذر اللاتيني ‎cervic‎ يعني؟", "o": ["العنق", "الفخذ", "أسفل الظهر", "الصدر"], "a": 0, "e": "cervic (لاتيني) = العنق؛ المرادف اليوناني trachel/o."}, {"t": "latin", "q": "الجذر اللاتيني ‎femor‎ يعني؟", "o": ["الفخذ", "العنق", "الكتف", "الساعد"], "a": 0, "e": "femor (لاتيني) = الفخذ."}, {"t": "latin", "q": "الجذر اللاتيني ‎lumb‎ يعني؟", "o": ["أسفل الظهر (القَطَن)", "العنق", "الفخذ", "البطن"], "a": 0, "e": "lumb (لاتيني) = أسفل الظهر / القَطَن."}, {"t": "prefix", "q": "ماذا تعني البادئة ‎peri-‎؟", "o": ["حول / محيط", "نصف", "متعدد", "بطء"], "a": 0, "e": "peri- = حول / محيط، كما في Pericarditis."}, {"t": "prefix", "q": "ماذا تعني البادئة ‎hemi-‎؟", "o": ["نصف", "متعدد", "حول", "بطء"], "a": 0, "e": "hemi- = نصف، كما في Hemicolectomy."}, {"t": "prefix", "q": "ماذا تعني البادئة ‎poly-‎؟", "o": ["متعدد", "نصف", "قليل", "بطء"], "a": 0, "e": "poly- = متعدد، كما في Polyarthropathy."}, {"t": "prefix", "q": "ماذا تعني البادئة ‎brady-‎؟", "o": ["بطء", "سرعة", "نصف", "متعدد"], "a": 0, "e": "brady- = بطء، كما في Bradycardia."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-itis‎؟", "o": ["التهاب", "استئصال", "ألم", "تخطيط"], "a": 0, "e": "-itis = التهاب."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-ectomy‎؟", "o": ["استئصال جراحي", "التهاب", "ترميم", "تنظير"], "a": 0, "e": "-ectomy = الاستئصال الجراحي."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-pathy‎؟", "o": ["اعتلال / مرض", "التهاب", "ألم", "علم"], "a": 0, "e": "-pathy = اعتلال / مرض."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-ology‎؟", "o": ["علم / دراسة", "ألم", "تنظير", "تسجيل"], "a": 0, "e": "-ology = علم / دراسة (تخصص)."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-gram‎؟", "o": ["تخطيط / تسجيل", "تنظير", "استئصال", "ألم"], "a": 0, "e": "-gram = تخطيط / تسجيل."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-oscopy‎؟", "o": ["تنظير", "تخطيط", "استئصال", "ترميم"], "a": 0, "e": "-oscopy = تنظير بالمنظار."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-plasty‎؟", "o": ["ترميم / جراحة تجميلية", "استئصال", "تنظير", "التهاب"], "a": 0, "e": "-plasty = ترميم / جراحة تجميلية."}, {"t": "suffix", "q": "ماذا تعني اللاحقة ‎-algia‎؟", "o": ["ألم", "التهاب", "اعتلال", "تنظير"], "a": 0, "e": "-algia = ألم."}, {"t": "vowel", "q": "متى نحذف حرف الربط ‎-o-‎؟", "o": ["إذا بدأت اللاحقة بحرف علة", "دائماً", "بين جذرين فقط", "لا نحذفه أبداً"], "a": 0, "e": "نحذف -o- إذا بدأت اللاحقة بحرف علة: gastr + itis = gastritis."}, {"t": "vowel", "q": "ما وظيفة حرف الربط ‎-o-‎؟", "o": ["تسهيل النطق فقط (بلا معنى)", "يدل على العضو", "يدل على الجمع", "يدل على المرض"], "a": 0, "e": "حرف الربط -o- لتسهيل النطق فقط ولا يحمل معنى."}, {"t": "term", "q": "ماذا يعني ‎Cardiology‎؟", "o": ["طب القلب", "التهاب القلب", "اعتلال عضلة القلب", "تخطيط القلب"], "a": 0, "e": "cardi/o + -ology = طب القلب."}, {"t": "term", "q": "ماذا يعني ‎Gastritis‎؟", "o": ["التهاب المعدة", "استئصال المعدة", "التهاب الأمعاء", "طب المعدة"], "a": 0, "e": "gastr + -itis = التهاب المعدة."}, {"t": "term", "q": "ماذا يعني ‎Nephrology‎؟", "o": ["طب الكلى", "التهاب الكلى", "استئصال الكلى", "تصوير الكلى"], "a": 0, "e": "nephr/o + -ology = طب الكلى."}, {"t": "term", "q": "ماذا يعني ‎Arthritis‎؟", "o": ["التهاب المفاصل", "اعتلال المفاصل", "ألم المفاصل", "استئصال المفصل"], "a": 0, "e": "arthr + -itis = التهاب المفاصل."}, {"t": "term", "q": "ماذا يعني ‎Arthropathy‎؟", "o": ["اعتلال المفاصل", "التهاب المفاصل", "ألم المفاصل", "تنظير المفصل"], "a": 0, "e": "arthr/o + -pathy = اعتلال المفاصل."}, {"t": "term", "q": "ماذا يعني ‎Polyarthropathy‎؟", "o": ["اعتلال المفاصل المتعدد", "التهاب مفصل واحد", "ألم المفاصل", "استئصال المفاصل"], "a": 0, "e": "poly- + arthr/o + -pathy."}, {"t": "term", "q": "ماذا يعني ‎Bradycardia‎؟", "o": ["بطء ضربات القلب", "سرعة ضربات القلب", "التهاب القلب", "اعتلال القلب"], "a": 0, "e": "brady- + cardi = بطء ضربات القلب."}, {"t": "term", "q": "ماذا يعني ‎Carditis‎؟", "o": ["التهاب القلب", "بطء القلب", "طب القلب", "اعتلال القلب"], "a": 0, "e": "cardi + -itis = التهاب القلب."}, {"t": "term", "q": "ماذا يعني ‎Cardiomyopathy‎؟", "o": ["اعتلال عضلة القلب", "التهاب عضلة القلب", "تخطيط القلب", "استئصال عضلة القلب"], "a": 0, "e": "cardi/o + my/o + -pathy."}, {"t": "term", "q": "ماذا يعني ‎Gastrectomy‎؟", "o": ["استئصال المعدة", "التهاب المعدة", "تنظير المعدة", "طب المعدة"], "a": 0, "e": "gastr + -ectomy = استئصال المعدة."}, {"t": "term", "q": "ماذا يعني ‎Gastroenterology‎؟", "o": ["طب الجهاز الهضمي", "التهاب معدي معوي", "استئصال الأمعاء", "تنظير المعدة"], "a": 0, "e": "gastr/o + enter/o + -ology."}, {"t": "term", "q": "ماذا يعني ‎Gastroenteritis‎؟", "o": ["التهاب معدي معوي", "طب الجهاز الهضمي", "استئصال المعدة", "اعتلال الأمعاء"], "a": 0, "e": "gastr/o + enter + -itis."}, {"t": "term", "q": "ماذا يعني ‎Hemicolectomy‎؟", "o": ["استئصال نصف القولون", "استئصال القولون كاملاً", "التهاب القولون", "تنظير القولون"], "a": 0, "e": "hemi- + col + -ectomy."}, {"t": "term", "q": "ماذا يعني ‎Hemigastrectomy‎؟", "o": ["استئصال نصف المعدة", "استئصال المعدة كاملةً", "التهاب المعدة", "استئصال نصف الأمعاء"], "a": 0, "e": "hemi- + gastr + -ectomy."}, {"t": "term", "q": "ماذا يعني ‎Pericarditis‎؟", "o": ["التهاب الغشاء المحيط بالقلب", "التهاب عضلة القلب", "التهاب داخل القلب", "بطء القلب"], "a": 0, "e": "peri- + cardi + -itis."}, {"t": "term", "q": "ماذا يعني ‎Pericolitis‎؟", "o": ["التهاب حول القولون", "التهاب داخل القولون", "استئصال القولون", "نصف القولون"], "a": 0, "e": "peri- + col + -itis."}, {"t": "term", "q": "ماذا يعني ‎Electrocardiogram‎؟", "o": ["تخطيط كهربائية القلب", "تصوير الكلى", "تنظير المعدة", "اعتلال العضلات"], "a": 0, "e": "electr/o + cardi/o + -gram (ECG)."}, {"t": "term", "q": "ماذا يعني ‎Ophthalmomyositis‎؟", "o": ["التهاب عضلات العين", "التهاب العين", "ألم العين", "استئصال العضلة"], "a": 0, "e": "ophthalm/o + myos + -itis = التهاب عضلات العين."}];
let order=[],idx=0,score=0;
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(){
  order=QUESTIONS.map(q=>({...q,opts:shuffle(q.o.map((text,oi)=>({text,correct:oi===q.a})))}));
  idx=0;score=0;$('end').style.display='none';$('quiz').style.display='block';$('live').textContent='النتيجة: 0';render();
}
function render(){
  const q=order[idx];
  $('counter').textContent=`السؤال ${idx+1} من ${order.length}`;
  $('prog').style.width=`${(idx/order.length)*100}%`;
  $('tag').textContent=LABEL[q.t];$('tag').style.background=C[q.t];$('tag').style.color=TAGTX[q.t]||'#fff';
  $('question').textContent=q.q;
  const box=$('options');box.innerHTML='';$('feedback').style.display='none';$('nextBtn').style.display='none';
  q.opts.forEach(opt=>{const b=document.createElement('button');b.className='opt';b.textContent=opt.text;b.onclick=()=>answer(b,opt,q);box.appendChild(b);});
}
function answer(btn,opt,q){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$('feedback');
  if(opt.correct){btn.classList.add('correct');score++;$('live').textContent='النتيجة: '+score;fb.className='fb ok';fb.innerHTML='✅ <b>إجابة صحيحة!</b><br>'+q.e;}
  else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{const t=q.opts.find(o=>o.text===b.textContent);if(t&&t.correct)b.classList.add('correct');});fb.className='fb no';fb.innerHTML='❌ <b>إجابة خاطئة.</b><br>'+q.e;}
  fb.style.display='block';$('nextBtn').style.display='block';
}
$('nextBtn').onclick=()=>{idx++;if(idx<order.length)render();else showResult();};
function showResult(){
  $('quiz').style.display='none';$('end').style.display='block';
  const pct=Math.round(score/order.length*100);
  $('finalScore').textContent=`${score} / ${order.length}`;
  let m;if(pct===100)m='ممتاز! إتقان كامل 🌟';else if(pct>=75)m='أداء رائع — راجِع ما أخطأت فيه وكرّر.';else if(pct>=50)m='جيد، والتكرار سيرسّخ المصطلحات أكثر. حاول مرة أخرى.';else m='لا بأس! شاهد الدرس مجدداً ثم أعد التمرين — التكرار هو المفتاح.';
  $('finalMsg').textContent=m;
}
start();
</script>
</body>
</html>
